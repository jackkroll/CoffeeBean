<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Shop</title>
    <style>
        #title > *{
            margin:1px;
        }
        li > *{
            margin:1px;
        }
        h4 {
            margin:3px;
        }
    </style>
</head>
<body>
    <div id="title">
        <h2>BeanRatings for [ITEMNAME]</h2>
        <h4>at [SHOPNAME]</h4>
    </div>
    <ul>
        {% for review in shopReviews %}
        <li>
            <p>{{review.lowerRange}} -- {{review.value}} -- {{review.upperRange}}</p>
            <p>"[REVIEWCOMMENTHERE]"</p>
            <br>
        </li>
        {% endfor %}
    </ul>
    <h4>Add your review for [ITEMNAME]!</h4>
    <form action="/review" method="POST">
        <input type="hidden" id="shopID" name="shopID" value="{{ shop.id }}">
        <input type="hidden" id="itemID" name="itemID" value="{{ item.id }}">
        <label for="value">Bitterness Ranking:</label>
        <input type="number" id="value" name="value">
        <br>
        <label for="comment">Comments:</label>
        <input type="text", id="comment", name="comment">
        <br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
